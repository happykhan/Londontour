<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Londontour</title>
    <meta
      name="description"
      content="Choose a London tour, see the route on a familiar map, and print the directions."
    />
    <link rel="stylesheet" href="assets/vendor/leaflet.css?v=20260621-0245" />
    <link rel="stylesheet" href="assets/styles.css?v=20260621-0245" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="tour-panel" aria-label="Tour chooser and details">
        <div class="tour-heading">
          <div class="brand-row">
            <p class="kicker">Londontour</p>
            <div class="utility-actions" aria-label="App actions">
              <button id="theme-button" class="secondary-button" type="button">Dark</button>
              <button id="share-button" class="secondary-button" type="button">Share</button>
            </div>
          </div>
          <h1>Choose a route</h1>
          <p class="status" id="status" role="status">
            Pick a route, then the map updates with the tour, POI pins, and your position.
          </p>
        </div>

        <section class="route-pickers" aria-label="Route choices">
          <div id="route-picker" class="route-picker"></div>
          <button id="browse-picker-button" class="secondary-button browse-picker-button" type="button">Browse map</button>
        </section>

        <section id="layers-panel" class="layers-panel" aria-label="Map layers">
          <div class="section-row">
            <h2>Map layers</h2>
            <div class="layer-actions" aria-label="Layer shortcuts">
              <button id="layers-all-button" class="secondary-button compact-button" type="button">All</button>
              <button id="layers-none-button" class="secondary-button compact-button" type="button">None</button>
            </div>
          </div>
          <div id="layer-list" class="layer-list"></div>
        </section>

        <section class="route-card-view" aria-label="Selected route">
          <div class="route-topline">
            <span class="kicker">Current route</span>
            <h2 id="route-title"></h2>
          </div>
          <p id="route-summary" class="route-summary-text"></p>

          <div id="route-meta" class="route-meta"></div>
        </section>

        <section class="directions-panel" aria-label="Printable directions">
          <div class="section-row">
            <h2>Printable directions</h2>
            <button id="print-button" type="button">Print</button>
          </div>
          <ol id="directions" class="directions"></ol>
        </section>

        <section class="highlights-panel" aria-label="Route highlights">
          <div class="section-row">
            <h2>Selected layer stops</h2>
          </div>
          <ul id="route-highlights" class="poi-list"></ul>
        </section>

        <section class="offline-panel" aria-label="Offline pack manager">
          <div class="section-row">
            <h2>Offline pack</h2>
          </div>
          <fieldset class="offline-options">
            <label><input type="checkbox" name="offline-route" checked /> Selected route</label>
            <label><input type="checkbox" name="offline-tiles" checked /> Local map tiles</label>
            <label><input type="checkbox" name="offline-layers" checked /> Visible layers</label>
          </fieldset>
          <p id="offline-details" class="offline-details"></p>
        </section>
      </aside>

      <section class="map-panel" aria-label="Map">
        <div id="map" class="map" aria-label="Interactive map"></div>
        <div class="map-topbar" aria-label="Route controls">
          <button id="change-route-button" class="secondary-button" type="button">Routes</button>
          <button id="recenter-button" class="secondary-button" type="button">Recenter</button>
          <button id="browse-map-button" class="secondary-button" type="button" aria-controls="layers-panel" aria-expanded="false">Browse</button>
          <button id="map-print-button" type="button">Print</button>
        </div>
        <div class="map-actions">
          <button id="locate-button" type="button">Use my location</button>
          <button id="offline-button" class="secondary-button" type="button">Download offline pack</button>
        </div>
      </section>
    </main>

    <script src="assets/vendor/leaflet.js?v=20260621-0245"></script>
    <script src="assets/app.js?v=20260621-0245"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js?v=20260621-0245').catch(() => {});
        });
      }
    </script>
  </body>
</html>
