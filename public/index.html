<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Londontour</title>
    <meta
      name="description"
      content="Browse a London tour map, switch layers, choose routes, and print directions."
    />
    <link rel="stylesheet" href="assets/vendor/leaflet.css?v=20260621-1230" />
    <link rel="stylesheet" href="assets/styles.css?v=20260621-1230" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="tour-panel" aria-label="Tour chooser and details">
        <div class="tour-heading">
          <div class="brand-row">
            <p class="kicker">Londontour</p>
          </div>
          <h1>Routes</h1>
          <p class="status" id="status" role="status">
            Browse the map, then choose a route when you want a guided itinerary.
          </p>
        </div>

        <section class="route-pickers" aria-label="Route choices">
          <div class="route-picker-heading">
            <h2>Choose a route</h2>
            <p>Select a guided itinerary or keep browsing without one.</p>
          </div>
          <div id="route-picker" class="route-picker"></div>
          <button id="browse-picker-button" class="secondary-button browse-picker-button" type="button">Browse map</button>
        </section>

        <section id="layers-panel" class="layers-panel" aria-label="Map layers">
          <div class="section-row">
            <h2>Map layers</h2>
            <div class="layer-actions" aria-label="Layer shortcuts">
              <button id="layers-all-button" class="secondary-button compact-button" type="button">All</button>
              <button id="layers-none-button" class="secondary-button compact-button" type="button">None</button>
            </div>
          </div>
          <div id="layer-list" class="layer-list"></div>
        </section>

        <section id="editor-panel" class="editor-panel" aria-label="Route editor" hidden>
          <div class="section-row">
            <h2>Route editor</h2>
            <div class="layer-actions" aria-label="Editor actions">
              <button id="editor-undo-button" class="secondary-button compact-button" type="button">Undo</button>
              <button id="editor-clear-button" class="secondary-button compact-button" type="button">Clear</button>
            </div>
          </div>
          <p id="editor-summary" class="offline-details"></p>
          <textarea id="editor-output" class="editor-output" readonly aria-label="Route editor JSON"></textarea>
          <button id="editor-copy-button" class="secondary-button" type="button">Copy route draft JSON</button>
        </section>

        <section class="route-card-view" aria-label="Selected route">
          <div class="route-topline">
            <span class="kicker">Current route</span>
            <h2 id="route-title"></h2>
          </div>
          <p id="route-summary" class="route-summary-text"></p>

          <div id="route-meta" class="route-meta"></div>
        </section>

        <section class="directions-panel" aria-label="Printable directions">
          <div class="section-row">
            <h2>Printable directions</h2>
          </div>
          <ol id="directions" class="directions"></ol>
        </section>

        <section class="highlights-panel" aria-label="Route highlights">
          <div class="section-row">
            <h2>Selected layer stops</h2>
          </div>
          <ul id="route-highlights" class="poi-list"></ul>
        </section>

        <section id="menu-panel" class="menu-panel" aria-label="Map menu">
          <div class="section-row">
            <h2>Menu</h2>
          </div>
          <div class="menu-actions" aria-label="App actions">
            <button id="share-button" class="secondary-button" type="button">Share</button>
            <button id="print-button" class="secondary-button" type="button">Print</button>
          </div>
        </section>

        <section id="offline-panel" class="offline-panel" aria-label="Offline pack manager">
          <div class="section-row">
            <h2>Offline pack</h2>
          </div>
          <fieldset class="offline-options">
            <label><input type="checkbox" name="offline-route" checked /> Selected route</label>
            <label><input type="checkbox" name="offline-tiles" checked /> Local map tiles</label>
            <label><input type="checkbox" name="offline-layers" checked /> Visible layers</label>
          </fieldset>
          <p id="offline-details" class="offline-details"></p>
          <button id="offline-button" class="secondary-button" type="button">Download offline pack</button>
        </section>
      </aside>

      <section class="map-panel" aria-label="Map">
        <div id="map" class="map" aria-label="Interactive map"></div>
        <div id="zoom-indicator" class="zoom-indicator" aria-live="polite">Zoom --</div>
        <div class="map-topbar" aria-label="Route controls">
          <button id="change-route-button" class="secondary-button" type="button">Routes</button>
          <button id="recenter-button" class="secondary-button" type="button">Recenter</button>
          <button id="browse-map-button" class="secondary-button" type="button" aria-controls="layers-panel" aria-expanded="false">Layers</button>
          <button id="locate-button" class="icon-button" type="button" aria-label="Use my location" title="Use my location"><span class="location-icon" aria-hidden="true"></span></button>
          <button id="theme-button" class="icon-button" type="button" aria-label="Switch to dark mode" title="Switch to dark mode"><span class="theme-icon" aria-hidden="true"></span></button>
          <button id="menu-button" class="icon-button" type="button" aria-label="Open menu" aria-controls="menu-panel offline-panel" aria-expanded="false" title="Menu"><span class="menu-icon" aria-hidden="true"></span></button>
        </div>
      </section>
    </main>

    <script src="assets/vendor/leaflet.js?v=20260621-1230"></script>
    <script src="assets/app.js?v=20260621-1230"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js?v=20260621-1230').catch(() => {});
        });
      }
    </script>
  </body>
</html>
