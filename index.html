<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>London Tour</title>
    <meta
      name="description"
      content="A printable London walking tour map with user location and free OpenStreetMap tiles."
    />
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="preconnect" href="https://tile.openstreetmap.org" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQ3MkdrJvgoIZHGdGQfuxqgDdbx0YUU="
      crossorigin=""
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="map-panel" aria-label="London tour map">
        <div id="map" class="map" aria-label="Interactive map"></div>
        <div class="map-actions">
          <button id="locate-button" type="button">Use my location</button>
          <button id="print-button" type="button">Print directions</button>
        </div>
      </section>

      <aside class="tour-panel" aria-label="Tour details">
        <div class="tour-heading">
          <p class="kicker">Self-guided route</p>
          <h1>London Tour</h1>
          <p id="status" class="status" role="status">
            Allow location access to add your position to the map.
          </p>
        </div>

        <section class="route-summary" aria-label="Route summary">
          <div>
            <span class="label">Stops</span>
            <strong>6</strong>
          </div>
          <div>
            <span class="label">Walk</span>
            <strong>4.7 km</strong>
          </div>
          <div>
            <span class="label">Time</span>
            <strong>75-95 min</strong>
          </div>
        </section>

        <section aria-label="Printable directions">
          <h2>Printable Directions</h2>
          <ol id="directions" class="directions"></ol>
        </section>
      </aside>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="assets/app.js"></script>
  </body>
</html>
